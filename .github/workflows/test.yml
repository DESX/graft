name: tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history + tags so the runner can report the graft version
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y make curl git tar unzip patch gcc
      - name: Run test suite
        run: make -C tests
